upstream backend {
    server backend:8082;
}

server {
    listen 80;
    server_name localhost;
    
    client_max_body_size 1024M;

    # Frontend (Angular static files)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend API proxy
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Static Movie Posters (Bypass Backend/Security)
    location /api/vod/poster/ {
        alias /data/uploads/posters/;
        add_header Cache-Control "public, max-age=31536000";
        try_files $uri =404;
    }

    # WebSocket for Watch Party (SockJS needs sub-path forwarding)
    location /ws-party-v2/ {
        proxy_pass http://backend/ws-party-v2/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location = /ws-party-v2 {
        proxy_pass http://backend/ws-party-v2;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Video output files
    location /outputs/ {
        proxy_pass http://backend/outputs/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Live HLS Stream proxy
    location /hls/ {
        proxy_pass http://rtmp:8085/hls/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin *;
    }

    # Live Recordings (DVR) proxy
    location /recordings/ {
        proxy_pass http://rtmp:8085/recordings/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin *;
    }
}
