# Docker Profile - PostgreSQL via Docker Compose
spring.datasource.url=jdbc:postgresql://postgres:5432/transcoderdb
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# FFmpeg paths inside Docker container
ffmpeg.path=/usr/bin/ffmpeg
ffprobe.path=/usr/bin/ffprobe

# File paths inside Docker container
file.upload-dir=/data/uploads
file.output-dir=/data/outputs

# HLS Base URL for playback (using the frontend proxy)
app.live-hls-base-url=/hls
app.vod-hls-base-url=/api/vod/stream
# app.hls-base-url was removed to avoid confusion
