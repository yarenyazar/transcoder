# ==============================================
# Yaren Transcoder - Application Configuration
# ==============================================

spring.application.name=yaren-transcoder
server.port=8082

# --- PostgreSQL Database ---
spring.datasource.url=jdbc:postgresql://localhost:5432/transcoderdb
app.live-hls-base-url=http://localhost:8085/hls
app.vod-hls-base-url=http://localhost:8080/api/vod/stream
spring.datasource.username=yarenyazar
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# --- File Upload Limits (1GB for video) ---
spring.servlet.multipart.max-file-size=1024MB
spring.servlet.multipart.max-request-size=1024MB

# --- Server ---
server.tomcat.connection-timeout=20000

# --- FFmpeg Paths (Docker System Paths) ---
ffmpeg.path=ffmpeg
ffprobe.path=ffprobe

# --- File Storage Paths (Docker Volume Paths) ---
file.upload-dir=/data/uploads
file.output-dir=/data/outputs