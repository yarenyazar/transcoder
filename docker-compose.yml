services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: transcoder-db
    environment:
      POSTGRES_DB: transcoderdb
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: transcoder-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      TZ: Europe/Istanbul
    volumes:
      - ./data/uploads:/data/uploads
      - ./data/outputs:/data/outputs
      - ./data/hls:/tmp/hls
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8082:8082"
    restart: unless-stopped

  # Nginx RTMP Server for Live Streaming
  rtmp:
    image: alfg/nginx-rtmp:latest
    container_name: transcoder-rtmp
    ports:
      - "1935:1935" # RTMP Ingest
      - "8085:8085" # HTTP HLS Output
    volumes:
      - ./nginx-rtmp.conf:/etc/nginx/nginx.conf:ro
      - ./data/hls:/tmp/hls
      - ./data/outputs/recordings:/tmp/recordings
    command: [ "nginx", "-g", "daemon off;" ]
    restart: unless-stopped

  # Angular Frontend + Nginx Reverse Proxy
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: transcoder-frontend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/uploads:/data/uploads:ro
    ports:
      - "80:80"
    depends_on:
      - backend
  # AI Subtitle Generation Service (Python Faster-Whisper)
  ai-subtitles:
    build:
      context: ./subtitle-service
      dockerfile: Dockerfile
    container_name: transcoder-ai-subtitles
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data/uploads:/data/uploads
    restart: unless-stopped

volumes:
  postgres_data:
