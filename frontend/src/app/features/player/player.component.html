<div class="player-container" *ngIf="job">
  <div class="video-card">
    <header>
      <h2>{{ job.fileName }}</h2>
      <button class="btn-back" (click)="goBack()">← Dashboard'a Dön</button>
    </header>

    <div class="video-wrapper">
      <video *ngIf="videoUrl" [src]="videoUrl" controls autoplay width="100%" height="100%">
        Tarayıcınız video oynatmayı desteklemiyor.
      </video>
    </div>

    <div class="job-details" *ngIf="job.selectedPreset">
      <div class="detail-item">
        <span class="detail-label">Preset</span>
        <span class="detail-value">{{ job.selectedPreset.name }}</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">Çözünürlük</span>
        <span class="detail-value">{{ job.selectedPreset.width }}x{{ job.selectedPreset.height }}</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">Codec</span>
        <span class="detail-value">{{ job.selectedPreset.videoCodec }}</span>
      </div>
      <div class="detail-item">
        <span class="detail-label">Format</span>
        <span class="detail-value">.{{ job.selectedPreset.container }}</span>
      </div>
    </div>
  </div>
</div>
